# Root "app-of-apps" Application.
#
# "<ACCOUNT_ID>" is a placeholder substituted at deploy time by argocd-install.sh.
#
# Applied after ArgoCD is running (step 5 of argocd-install.sh). Once applied,
# ArgoCD pulls the platform Helm chart from ECR OCI and creates child Applications
# for every platform component (LBC, ESO, kube-prometheus-stack, ingress, todo app).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: oci://<ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com/charts
    chart: platform
    # Pin to a specific version; bump after each `helm push` of the platform chart.
    targetRevision: 0.1.0

    helm:
      releaseName: platform
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
