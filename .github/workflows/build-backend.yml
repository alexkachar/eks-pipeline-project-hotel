name: Build Backend

on:
  push:
    branches:
      - main
    paths:
      - "apps/backend/**"

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 038526103886.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: todo-backend

jobs:
  build-and-push:
    name: Build & push backend image
    runs-on: [self-hosted, linux, x64, vpc]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} \
            | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - name: Build image
        run: |
          docker build \
            -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }} \
            apps/backend/

      - name: Push image
        run: |
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}

      - name: Output image tag
        run: echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
