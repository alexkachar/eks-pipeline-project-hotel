server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api/* to the backend container.
    # This block is only used in local docker-compose — in Kubernetes the ALB
    # routes /api/* directly to the backend service before traffic reaches nginx.
    location /api/ {
        proxy_pass         http://backend:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # Serve the React SPA — fall back to index.html for client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
