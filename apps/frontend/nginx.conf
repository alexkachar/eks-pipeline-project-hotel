server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve the React SPA — fall back to index.html for client-side routing.
    # In Kubernetes, the ALB routes /api/* directly to the backend service
    # before the request ever reaches this nginx, so no proxy block is needed.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
