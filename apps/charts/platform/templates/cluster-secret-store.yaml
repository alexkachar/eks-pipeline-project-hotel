# ClusterSecretStore backed by AWS SSM Parameter Store.
# Used by ExternalSecrets in any namespace (monitoring, todo, etc.) that need
# to pull parameters from SSM. ESO uses the argocd-ecr role's Pod Identity
# association — actually the external-secrets ServiceAccount in the
# external-secrets namespace — so no credentials are stored here.
#
# Sync wave 1 — after ESO (wave 0) CRDs and controller are ready,
# before any ExternalSecret in wave 1+ tries to reference this store.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-parameter-store
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  provider:
    aws:
      service: ParameterStore
      region: {{ .Values.global.region }}
      # Pod Identity: ESO's controller pod carries the IAM role via the Pod
      # Identity association — no auth fields needed here.
      auth: {}
