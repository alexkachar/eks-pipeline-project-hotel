# Platform chart values.
# Fill in the <PLACEHOLDER> values for your environment before pushing this
# chart to ECR. All concrete AWS values are sourced from terraform.tfvars.

global:
  # ECR registry: <account_id>.dkr.ecr.<region>.amazonaws.com
  # Retrieve with: aws sts get-caller-identity --query Account --output text
  ecrRegistry: <ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com
  region: us-east-1
  # Terraform output: terraform -chdir=infra output -raw cluster_name
  clusterName: <PROJECT_NAME>-<ENVIRONMENT>-cluster

# Shared ALB configuration — all subdomains share one internet-facing ALB
# via the ALB controller's IngressGroup feature.
ingress:
  # Must match the ingress.group_name set in the todo Helm values and
  # the groupName annotation on all Ingress objects in this chart.
  groupName: <PROJECT_NAME>
  scheme: internet-facing
  targetType: ip
  # Terraform output: terraform -chdir=infra output -raw wildcard_certificate_arn
  certificateArn: <ACM_CERTIFICATE_ARN>
  # Subdomains — must match your Route 53 hosted zone domain.
  argocdHost: argocd.<DOMAIN_NAME>
  grafanaHost: grafana.<DOMAIN_NAME>
  todoHost: todo.<DOMAIN_NAME>

# AWS Load Balancer Controller
lbc:
  chartVersion: "1.13.0"
  image:
    tag: v2.13.0

# External Secrets Operator
eso:
  chartVersion: "0.10.4"
  image:
    tag: v0.10.4

# kube-prometheus-stack (Prometheus + Grafana)
prometheus:
  chartVersion: "66.2.1"
  grafana:
    # Terraform output: terraform -chdir=infra output -raw grafana_admin_password_parameter_name
    adminPasswordSsmParameter: /<PROJECT_NAME>/grafana/admin-password
    image:
      tag: "11.3.0"
  prometheusImage:
    tag: v2.55.1
  alertmanagerImage:
    tag: v0.27.0
  nodeExporterImage:
    tag: v1.8.2
  kubeStateMetricsImage:
    tag: v2.14.0
  prometheusOperatorImage:
    tag: v0.78.1
  k8sSidecarImage:
    tag: "1.28.0"

# Todo application
todo:
  # Chart version to deploy. CI bumps and pushes the chart after each build;
  # update this value after each release to trigger ArgoCD reconciliation.
  chartVersion: "0.1.1"
  # SSM prefix where RDS connection params live (set by the rds Terraform module).
  # Terraform output: terraform -chdir=infra output -raw rds_ssm_parameter_prefix
  ssmPrefix: /<PROJECT_NAME>/rds
