# Platform chart values.
# All concrete AWS-specific values are set here; the templates reference them
# so nothing is hardcoded in the Application manifests themselves.

global:
  ecrRegistry: 038526103886.dkr.ecr.us-east-1.amazonaws.com
  region: us-east-1
  clusterName: project-hotel-dev-cluster

# Shared ALB configuration — all subdomains share one internet-facing ALB
# via the ALB controller's IngressGroup feature.
ingress:
  groupName: project-hotel
  scheme: internet-facing
  targetType: ip
  certificateArn: arn:aws:acm:us-east-1:038526103886:certificate/0702be4a-814e-44bd-894d-dca6879e62c6
  # Subdomains that receive ALB alias Route53 records after LBC provisions the ALB.
  argocdHost: argocd.alexanderkachar.com
  grafanaHost: grafana.alexanderkachar.com

# AWS Load Balancer Controller
lbc:
  chartVersion: "1.13.0"
  image:
    tag: v2.13.0

# External Secrets Operator
eso:
  chartVersion: "0.10.4"
  image:
    tag: v0.10.4

# kube-prometheus-stack (Prometheus + Grafana)
prometheus:
  chartVersion: "66.2.1"
  grafana:
    adminPasswordSsmParameter: /project-hotel/grafana/admin-password
    image:
      tag: "11.3.0"
  prometheusImage:
    tag: v2.55.1
  alertmanagerImage:
    tag: v0.27.0
  nodeExporterImage:
    tag: v1.8.2
  kubeStateMetricsImage:
    tag: v2.14.0
  prometheusOperatorImage:
    tag: v0.78.1
  k8sSidecarImage:
    tag: "1.28.0"

# Todo application
todo:
  # Chart version to deploy. CI (package-charts.yml) bumps and pushes the chart;
  # update this value after each release to trigger ArgoCD reconciliation.
  chartVersion: "0.1.1"
  # SSM prefix where RDS connection params live (set by the rds Terraform module).
  ssmPrefix: /project-hotel/rds
