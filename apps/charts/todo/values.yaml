nameOverride: ""
fullnameOverride: ""

# ECR registry: <account_id>.dkr.ecr.<region>.amazonaws.com
# Retrieve with: aws sts get-caller-identity --query Account --output text
imageRegistry: <ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com

# Root domain for ingress host construction.
domainName: <DOMAIN_NAME>

frontend:
  replicaCount: 2
  image:
    repository: todo-frontend
    tag: dev
    pullPolicy: IfNotPresent
  service:
    port: 80
    targetPort: 8080
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 128Mi

backend:
  replicaCount: 2
  image:
    repository: todo-backend
    tag: dev
    pullPolicy: IfNotPresent
  service:
    port: 3000
  env:
    dbSsl: "true"
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

rds:
  # SSM prefix — must match the rds Terraform module output (rds_ssm_parameter_prefix).
  ssmPrefix: /<PROJECT_NAME>/rds
  secretName: todo-backend-db

externalSecrets:
  enabled: true
  refreshInterval: 1h
  secretStoreName: todo-aws-parameter-store
  # SecretStore (namespace-scoped, created by this chart) or ClusterSecretStore
  # (cluster-wide, created by the platform chart). Switch to ClusterSecretStore
  # when deploying via the platform app-of-apps to avoid duplicate stores.
  secretStoreKind: SecretStore
  region: us-east-1

ingress:
  enabled: true
  host: todo.<DOMAIN_NAME>
  groupName: <PROJECT_NAME>
  scheme: internet-facing
  targetType: ip
  # Terraform output: terraform -chdir=infra output -raw wildcard_certificate_arn
  certificateArn: <ACM_CERTIFICATE_ARN>
  healthcheckPath: /
  listenPorts:
    - HTTP: 80
    - HTTPS: 443

monitoring:
  serviceMonitor:
    enabled: false
    interval: 30s
